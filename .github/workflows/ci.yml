name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GH_TOKEN: ${{ github.token }}
          GITLEAKS_VERSION: 8.30.0
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          gh release download "v${GITLEAKS_VERSION}" \
            --repo gitleaks/gitleaks \
            --pattern "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --pattern "gitleaks_${GITLEAKS_VERSION}_checksums.txt" \
            --dir "$tmp"
          (
            cd "$tmp"
            grep "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz$" "gitleaks_${GITLEAKS_VERSION}_checksums.txt" | sha256sum -c -
            tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" gitleaks
          )
          mkdir -p "$RUNNER_TEMP/gitleaks-bin"
          install -m 0755 "$tmp/gitleaks" "$RUNNER_TEMP/gitleaks-bin/gitleaks"
          echo "$RUNNER_TEMP/gitleaks-bin" >> "$GITHUB_PATH"

      - name: Gitleaks
        run: gitleaks detect --redact --config .gitleaks.toml --source . --platform github

      - name: Check image variants
        env:
          DEVIMG_RELEASE_TOKEN: ${{ secrets.DEVIMG_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${DEVIMG_RELEASE_TOKEN:-}" ]]; then
            echo "::warning::Skipping devimg check because DEVIMG_RELEASE_TOKEN is not configured."
            exit 0
          fi
          tmp="$(mktemp -d)"
          GH_TOKEN="$DEVIMG_RELEASE_TOKEN" gh release download v0.1.3 \
            --repo cleissonom/devimg \
            --pattern 'devimg-linux-x86_64.tar.gz*' \
            --dir "$tmp"
          (
            cd "$tmp"
            sha256sum -c devimg-linux-x86_64.tar.gz.sha256
            tar -xzf devimg-linux-x86_64.tar.gz
          )
          "$tmp/devimg" check --config devimg.toml
          "$tmp/devimg" check --config devimg-cli-tools.toml

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: Production
    concurrency:
      group: vercel-production
      cancel-in-progress: true
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_USER_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Pull Vercel project settings
        run: npx vercel@latest pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel artifacts
        run: npx vercel@latest build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to Vercel
        run: npx vercel@latest deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
