[project]
root = "."
manifest = "public/images/devimg-manifest.json"
report = ".devimg/devimg-report.md"
overwrite = false
strip_metadata = true
content_hash_filenames = true

[[sources]]
name = "project-covers"
input = "public/projects"
output = "public/images/generated/projects"
include = ["**/*.webp", "**/*.png", "**/*.jpg", "**/*.jpeg"]

[[preset]]
name = "project-card"
widths = [640]
formats = ["jpeg"]
quality = 90
fit = "cover"
aspect_ratio = "16:9"
crop = "top"
allow_upscale = false

[[preset]]
name = "project-banner"
widths = [1200]
formats = ["jpeg"]
quality = 90
fit = "cover"
aspect_ratio = "1200:630"
crop = "top"
allow_upscale = false

[[overrides]]
include = ["cli_tools.png"]
fit = "contain"

[[overrides]]
include = ["devimg.png"]
fit = "contain"

[budgets]
max_total_bytes = "800kb"
max_file_bytes = "200kb"
fail_on_regression = true
