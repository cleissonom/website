[project]
root = "."
manifest = "public/images/devimg-cli-tools-manifest.json"
report = ".devimg/devimg-cli-tools-report.md"
overwrite = false
strip_metadata = true
content_hash_filenames = true

[[sources]]
name = "cli-tools-cover"
input = "public/projects"
output = "public/images/generated/projects"
include = ["cli_tools.png"]

[[preset]]
name = "project-card"
widths = [640]
formats = ["jpeg"]
quality = 82
fit = "contain"
aspect_ratio = "16:9"
allow_upscale = false

[[preset]]
name = "project-banner"
widths = [1200]
formats = ["jpeg"]
quality = 82
fit = "contain"
aspect_ratio = "1200:630"
allow_upscale = false

[budgets]
max_total_bytes = "180kb"
max_file_bytes = "120kb"
fail_on_regression = true
